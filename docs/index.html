<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>

    <!-- Instant Redirects -->
    <meta http-equiv="refresh" content="0; url=https://github.com/SegunAdewola/remit-track">
    <script>
        window.location.href = "https://github.com/SegunAdewola/remit-track";
    </script>

    <!-- Custom Styling -->
    <style>
        body {
            background-color: #0d1117; /* Page Color (GitHub Dark Gray) */
            color: #c9d1d9;            /* Text Color (Off-white) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; /* Text Style */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;             /* Prevents text touching screen edges on mobile */
            box-sizing: border-box;
            text-align: center;        /* Centers text on small screens */
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #238636; /* Button Color (GitHub Green) */
            color: #ffffff;            /* Button Text Color */
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;     /* Removes underline */
            border-radius: 6px;        /* Rounded corners */
            transition: background-color 0.2s;
            display: inline-block;     /* Ensures padding works perfectly on the link */
        }

        .btn:hover {
            background-color: #2ea44f; /* Button color when hovered */
        }
    </style>
</head>
<body>
    <p>Taking you to the project repository...</p>
    <a href="https://github.com/SegunAdewola/remit-track" class="btn">Click here if you're not redirected</a>
</body>
</html>
